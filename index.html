<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishna Runner</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:system-ui;
background:#020617;
}

#game{
width:100vw;
height:100vh;
position:relative;
background:linear-gradient(180deg,#0ea5e9,#1e3a8a,#020617);
}

/* Player */

#player{
position:absolute;
bottom:90px;
left:70px;
font-size:44px;
filter:drop-shadow(0 0 10px #facc15);
transition:transform .2s;
}

/* Obstacles */

.obstacle{
position:absolute;
bottom:90px;
font-size:34px;
}

/* Coin */

.coin{
position:absolute;
bottom:160px;
font-size:30px;
animation:spin 1.2s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* Ground */

#ground{
position:absolute;
bottom:0;
width:100%;
height:90px;
background:linear-gradient(90deg,#1e293b,#334155);
box-shadow:0 -4px 15px rgba(0,0,0,.5);
}

/* UI Panel */

#ui{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
padding:10px 18px;
border-radius:12px;
color:white;
font-size:16px;
display:flex;
gap:20px;
}

/* Start Button */

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#facc15,#f59e0b);
color:#000;
font-weight:bold;
box-shadow:0 6px 20px rgba(0,0,0,.4);
}

/* Level Popup */

#levelup{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:26px;
color:#facc15;
display:none;
text-shadow:0 0 15px #facc15;
}

</style>
</head>

<body>

<div id="game">

<div id="ui">

<div>Score: <span id="score">0</span></div>
<div>ज्ञान ✨: <span id="coins">0</span></div>
<div>Level 🧘: <span id="level">1</span></div>

</div>

<div id="player">🧿</div>

<div id="levelup">Meditation Level Unlocked</div>

<div id="ground"></div>

<button id="start">Start Krishna Journey</button>

</div>

<script>

let player=document.getElementById("player")
let game=document.getElementById("game")

let score=0
let coins=0
let level=1

let jumping=false
let running=false

function jump(){

if(jumping) return

jumping=true
let height=90

let up=setInterval(()=>{

if(height>=200){

clearInterval(up)

let down=setInterval(()=>{

if(height<=90){
clearInterval(down)
jumping=false
}

height-=6
player.style.bottom=height+"px"

},20)

}

height+=6
player.style.bottom=height+"px"

},20)

}

document.addEventListener("touchstart",jump)
document.addEventListener("keydown",jump)

/* Obstacles */

function createObstacle(){

let types=["😡","😠","😨"]

let obs=document.createElement("div")
obs.className="obstacle"
obs.innerHTML=types[Math.floor(Math.random()*3)]

obs.style.left=window.innerWidth+"px"

game.appendChild(obs)

let pos=window.innerWidth

let move=setInterval(()=>{

if(!running){
clearInterval(move)
obs.remove()
return
}

pos-=7+(level*1)

obs.style.left=pos+"px"

let playerBottom=parseInt(window.getComputedStyle(player).bottom)

if(pos<100 && pos>50 && playerBottom<130){

alert("Game Over\nScore: "+score)
location.reload()

}

if(pos<-40){

score++
document.getElementById("score").innerText=score

obs.remove()
clearInterval(move)

}

},20)

}

/* Coins */

function createCoin(){

let coin=document.createElement("div")
coin.className="coin"
coin.innerHTML="✨"

coin.style.left=window.innerWidth+"px"

game.appendChild(coin)

let pos=window.innerWidth

let move=setInterval(()=>{

if(!running){
clearInterval(move)
coin.remove()
return
}

pos-=7+(level*1)

coin.style.left=pos+"px"

let playerBottom=parseInt(window.getComputedStyle(player).bottom)

if(pos<100 && pos>50 && playerBottom>140){

coins++

document.getElementById("coins").innerText=coins

coin.remove()
clearInterval(move)

if(coins%5==0){

level++
document.getElementById("level").innerText=level

let popup=document.getElementById("levelup")

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},1500)

}

}

if(pos<-40){
coin.remove()
clearInterval(move)
}

},20)

}

/* Game Loop */

function gameLoop(){

setInterval(()=>{
if(running) createObstacle()
},1800)

setInterval(()=>{
if(running) createCoin()
},2600)

}

/* Start */

document.getElementById("start").onclick=function(){

running=true
this.style.display="none"

gameLoop()

}

</script>

</body>
</html>
