<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Krishna Code Puzzle</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.gamebox{
max-width:500px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:15px;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

#result{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="gamebox">

<h2>🧠 Krishna Code Puzzle</h2>

<p id="question"></p>

<div id="options"></div>

<p id="result"></p>

<p id="score"></p>

</div>

<script>

let questions=[

{
q:"मैं शरीर नहीं, मैं ___ हूँ",
options:["मन","साक्षी चेतना","अहंकार"],
answer:1
},

{
q:"वेदांत कहता है मन है",
options:["विचारों की धारा","आत्मा","भगवान"],
answer:0
},

{
q:"शांति आती है जब",
options:["मन रुकता है","विचार बढ़ते हैं","इच्छा बढ़ती है"],
answer:0
},

{
q:"कृष्ण का संदेश है",
options:["कर्म करो","भागो","डरो"],
answer:0
}

]

let index=0
let score=0

function loadQuestion(){

let q=questions[index]

document.getElementById("question").innerText=q.q

let optHTML=""

q.options.forEach((opt,i)=>{

optHTML+=`<button onclick="check(${i})">${opt}</button>`

})

document.getElementById("options").innerHTML=optHTML

document.getElementById("result").innerHTML=""

}

function check(i){

if(i==questions[index].answer){

score+=10

document.getElementById("result").innerHTML="✔ सही उत्तर"

}

else{

document.getElementById("result").innerHTML="❌ गलत उत्तर"

}

index++

setTimeout(()=>{

if(index<questions.length){

loadQuestion()

}

else{

document.getElementById("question").innerHTML="🎉 Game Complete"

document.getElementById("options").innerHTML=""

document.getElementById("score").innerHTML="आपका स्कोर: "+score

}

},800)

}

loadQuestion()

</script>

</body>

</html>
