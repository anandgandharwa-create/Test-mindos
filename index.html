<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Mind vs Witness</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding:40px;
}

.game{
max-width:500px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:15px;
}

.card{
background:#334155;
padding:40px;
border-radius:12px;
font-size:20px;
margin-bottom:20px;
}

button{
width:45%;
padding:12px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.mind{
background:#ef4444;
color:white;
}

.witness{
background:#22c55e;
color:white;
}

#result{
margin-top:15px;
font-size:18px;
}

</style>

</head>

<body>

<div class="game">

<h2>🧠 Mind vs Witness</h2>

<div class="card" id="thought"></div>

<button class="mind" onclick="answer('mind')">मन</button>
<button class="witness" onclick="answer('witness')">साक्षी</button>

<p id="result"></p>
<p id="score"></p>

</div>

<script>

let thoughts=[

{t:"मुझे डर लग रहा है",type:"mind"},
{t:"विचार आ रहे हैं",type:"mind"},
{t:"मैं विचारों को देख रहा हूँ",type:"witness"},
{t:"भावना उठी और चली गई",type:"witness"},
{t:"मुझे गुस्सा आया",type:"mind"}

]

let index=0
let score=0

function load(){

document.getElementById("thought").innerText=thoughts[index].t

document.getElementById("result").innerHTML=""

}

function answer(choice){

if(choice==thoughts[index].type){

score+=10
document.getElementById("result").innerHTML="✔ सही"

}
else{

document.getElementById("result").innerHTML="❌ गलत"

}

index++

setTimeout(()=>{

if(index<thoughts.length){

load()

}

else{

document.getElementById("thought").innerHTML="🎉 Game Complete"

document.getElementById("score").innerHTML="आपका स्कोर: "+score

}

},700)

}

load()

</script>

</body>
</html>
