<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishna Runner</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0f172a;
}

#game{
width:100vw;
height:100vh;
position:relative;
background:linear-gradient(#38bdf8,#0ea5e9);
}

#player{
position:absolute;
bottom:80px;
left:60px;
font-size:40px;
}

.obstacle{
position:absolute;
bottom:80px;
font-size:30px;
}

.coin{
position:absolute;
bottom:140px;
font-size:28px;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:80px;
background:#334155;
}

#ui{
position:absolute;
top:15px;
left:15px;
color:white;
font-size:18px;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:12px 20px;
font-size:18px;
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<div id="game">

<div id="ui">

Score: <span id="score">0</span>
<br>
ज्ञान: <span id="coins">0</span>
<br>
Level: <span id="level">1</span>

</div>

<div id="player">🧿</div>

<div id="ground"></div>

<button id="start">Start Krishna Journey</button>

</div>

<script>

let player=document.getElementById("player")
let game=document.getElementById("game")

let score=0
let coins=0
let level=1

let jumping=false
let running=false

function jump(){

if(jumping) return

jumping=true

let height=80

let up=setInterval(()=>{

if(height>=180){

clearInterval(up)

let down=setInterval(()=>{

if(height<=80){
clearInterval(down)
jumping=false
}

height-=6
player.style.bottom=height+"px"

},20)

}

height+=6
player.style.bottom=height+"px"

},20)

}

document.addEventListener("touchstart",jump)
document.addEventListener("keydown",jump)

function createObstacle(){

let types=["😡","😠","😨"] // अहंकार क्रोध भय

let obs=document.createElement("div")

obs.className="obstacle"

obs.innerHTML=types[Math.floor(Math.random()*types.length)]

obs.style.left=window.innerWidth+"px"

game.appendChild(obs)

let pos=window.innerWidth

let move=setInterval(()=>{

if(!running){

clearInterval(move)
obs.remove()
return

}

pos-=6+(level*1)

obs.style.left=pos+"px"

let playerBottom=parseInt(window.getComputedStyle(player).bottom)

if(pos<90 && pos>40 && playerBottom<120){

alert("Game Over\nScore: "+score)
location.reload()

}

if(pos<-40){

score++

document.getElementById("score").innerText=score

obs.remove()

clearInterval(move)

}

},20)

}

function createCoin(){

let coin=document.createElement("div")

coin.className="coin"

coin.innerHTML="✨"

coin.style.left=window.innerWidth+"px"

game.appendChild(coin)

let pos=window.innerWidth

let move=setInterval(()=>{

if(!running){

clearInterval(move)
coin.remove()
return

}

pos-=6+(level*1)

coin.style.left=pos+"px"

let playerBottom=parseInt(window.getComputedStyle(player).bottom)

if(pos<90 && pos>40 && playerBottom>120){

coins++

document.getElementById("coins").innerText=coins

coin.remove()

clearInterval(move)

if(coins%5==0){

level++

document.getElementById("level").innerText=level

alert("🧘 Meditation State Level "+level+" Unlocked")

}

}

if(pos<-40){

coin.remove()
clearInterval(move)

}

},20)

}

function gameLoop(){

setInterval(()=>{

if(running){

createObstacle()

}

},2000)

setInterval(()=>{

if(running){

createCoin()

}

},3000)

}

document.getElementById("start").onclick=function(){

running=true

this.style.display="none"

gameLoop()

}

</script>

</body>

</html>
