<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Meditation Balance</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:system-ui;
background:linear-gradient(180deg,#020617,#1e3a8a,#0ea5e9);
}

/* game area */

#game{

width:100vw;
height:100vh;
position:relative;

}

/* player */

#player{

position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:50px;
filter:drop-shadow(0 0 15px #38bdf8);

}

/* falling items */

.item{

position:absolute;
font-size:32px;

}

/* UI */

#ui{

position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.4);
padding:10px 18px;
border-radius:10px;
color:white;
display:flex;
gap:20px;

}

/* start button */

#start{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 28px;
border:none;
border-radius:10px;
font-size:18px;
background:gold;

}

</style>
</head>

<body>

<div id="game">

<div id="ui">

<div>शांति: <span id="score">0</span></div>
<div>ज्ञान ✨: <span id="coins">0</span></div>

</div>

<div id="player">🧘</div>

<button id="start">Start Meditation</button>

</div>

<script>

let player=document.getElementById("player")
let game=document.getElementById("game")

let score=0
let coins=0
let running=false

/* move player */

document.addEventListener("mousemove",e=>{

player.style.left=e.clientX+"px"

})

document.addEventListener("touchmove",e=>{

player.style.left=e.touches[0].clientX+"px"

})

/* create falling items */

function createItem(){

let types=["😡","😨","😤","✨"]

let item=document.createElement("div")

item.className="item"

let type=types[Math.floor(Math.random()*types.length)]

item.innerHTML=type

item.style.left=Math.random()*window.innerWidth+"px"

item.style.top="-50px"

game.appendChild(item)

let pos=-50

let fall=setInterval(()=>{

if(!running){

clearInterval(fall)
item.remove()
return

}

pos+=5

item.style.top=pos+"px"

let playerX=player.offsetLeft

let itemX=item.offsetLeft

let playerY=window.innerHeight-120

if(Math.abs(playerX-itemX)<50 && pos>playerY){

if(type=="✨"){

coins++
document.getElementById("coins").innerText=coins

}else{

alert("Mind Disturbed 😵")

location.reload()

}

item.remove()
clearInterval(fall)

}

if(pos>window.innerHeight){

item.remove()
clearInterval(fall)

score++

document.getElementById("score").innerText=score

}

},30)

}

/* loop */

function loop(){

setInterval(()=>{

if(running){

createItem()

}

},1200)

}

/* start */

document.getElementById("start").onclick=function(){

running=true

this.style.display="none"

loop()

}

</script>

</body>
</html>
